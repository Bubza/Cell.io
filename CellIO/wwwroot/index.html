<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELL.IO — Devour or Be Devoured</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Custom Cursor -->
    <div id="cursor"></div>

    <!-- Game Canvas (HTML5 Canvas for all rendering) -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD Overlay (score, leaderboard, minimap, controls) -->
    <div id="hud" class="hidden">
        <div class="hud-score" id="hud-score">0</div>
        <div class="hud-mass" id="hud-mass">MASS</div>

        <button class="hud-sound" id="sound-toggle">SOUND: ON</button>

        <div class="hud-leaderboard">
            <h3>Leaderboard</h3>
            <div id="leaderboard-list"></div>
        </div>

        <div class="hud-minimap">
            <canvas id="minimap-canvas" width="160" height="160"></canvas>
        </div>

        <div class="hud-controls">
            <span>Mouse</span> Move<br>
            <span>Click</span> Split<br>
            <span>W</span> Eject Mass<br>
            <span>Scroll</span> Zoom<br>
            <span>ESC</span> Pause
        </div>

        <div class="hud-fsm-debug" id="fsm-debug">
            <h4>Bot AI States</h4>
            <div id="fsm-debug-list"></div>
        </div>
    </div>

    <!-- ═══ MAIN MENU SCREEN ═══ -->
    <div class="screen-overlay" id="screen-menu">

        <!-- Petri dish ring decoration -->
        <div class="petri-ring petri-ring-1"></div>
        <div class="petri-ring petri-ring-2"></div>
        <div class="petri-ring petri-ring-3"></div>

        <div class="game-title">CELL.IO</div>
        <div class="subtitle">Devour or Be Devoured</div>
        <input class="name-input"
               id="player-name"
               type="text"
               placeholder="Enter your name"
               maxlength="16"
               autocomplete="off" />
        <button class="btn" id="btn-play" onclick="startGame()">PLAY</button>

        <div class="bg-picker">
            <div class="bg-picker-label">CULTURE MEDIUM</div>
            <div class="bg-swatches">
                <div class="bg-swatch active" data-theme="petri" title="Petri Dish"></div>
                <div class="bg-swatch" data-theme="white" title="Agar (White)"></div>
                <div class="bg-swatch" data-theme="dark" title="Dark Field"></div>
                <div class="bg-swatch" data-theme="microscope" title="Microscope Slide"></div>
                <div class="bg-swatch" data-theme="ocean" title="Saline"></div>
                <div class="bg-swatch" data-theme="forest" title="Nutrient Broth"></div>
            </div>
        </div>
    </div>

    <!-- ═══ GAME OVER SCREEN ═══ -->
    <div class="screen-overlay hidden" id="screen-gameover">
        <div class="subtitle">You Were Consumed</div>
        <div class="go-score" id="go-score">0</div>
        <div class="go-label">Final Score</div>
        <button class="btn pink" onclick="restartGame()">PLAY AGAIN</button>
        <button class="btn" onclick="backToMenu()">MENU</button>
    </div>

    <!-- ═══ PAUSE SCREEN ═══ -->
    <div class="screen-overlay hidden" id="screen-pause">
        <div class="pause-title">PAUSED</div>
        <button class="btn" onclick="resumeGame()">RESUME</button>
        <button class="btn pink" onclick="backToMenu()">QUIT</button>
    </div>

    <script>
        window.bgTheme = 'petri';
        const BG_THEMES = {
            petri: { bg: '#c4b86a', dot: 'rgba(100,85,20,0.14)', outside: 'rgba(10,10,14,0.82)' },
            white: { bg: '#f0ede6', dot: 'rgba(160,140,100,0.35)', outside: 'rgba(200,195,180,0.5)' },
            dark: { bg: '#0a0e17', dot: 'rgba(0,240,255,0.08)', outside: 'rgba(5,7,12,0.7)' },
            microscope: { bg: '#e8e0cc', dot: 'rgba(100,80,40,0.13)', outside: 'rgba(180,165,130,0.55)' },
            ocean: { bg: '#071428', dot: 'rgba(0,150,255,0.15)', outside: 'rgba(3,8,18,0.7)' },
            forest: { bg: '#071a0d', dot: 'rgba(90,255,138,0.15)', outside: 'rgba(3,10,5,0.7)' },
        };
        window.getBgTheme = () => BG_THEMES[window.bgTheme];

        // Swatch inline styles per theme
        const SWATCH_STYLES = {
            petri: 'background: radial-gradient(circle, #d6c97a, #8a7d38); box-shadow: 0 0 0 2px rgba(180,155,50,0.9)',
            white: 'background: radial-gradient(circle, #d9d3c5, #b0a890); box-shadow: 0 0 0 2px rgba(160,140,100,0.8)',
            dark: 'background: radial-gradient(circle, #1a2035, #0a0e17); box-shadow: 0 0 0 2px rgba(0,240,255,0.7)',
            microscope: 'background: radial-gradient(circle, #d4c9a0, #8b7d50); box-shadow: 0 0 0 2px rgba(180,150,60,0.8)',
            ocean: 'background: radial-gradient(circle, #0d2850, #071428); box-shadow: 0 0 0 2px rgba(0,150,255,0.7)',
            forest: 'background: radial-gradient(circle, #0d3318, #071a0d); box-shadow: 0 0 0 2px rgba(90,255,138,0.7)',
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.bg-swatch').forEach(s => {
                const theme = s.dataset.theme;
                s.style.cssText = SWATCH_STYLES[theme] || '';

                s.addEventListener('click', () => {
                    document.querySelectorAll('.bg-swatch').forEach(x => x.classList.remove('active'));
                    s.classList.add('active');
                    window.bgTheme = theme;
                });
            });
        });
    </script>

    <!-- Load game via ES6 modules -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
