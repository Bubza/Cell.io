<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00f0ff"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff2d75"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5aff8a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7b2dff"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffa726"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff5252"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="#0a0e17"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#00f0ff" font-size="22" font-weight="bold" filter="url(#glow)">CELL.IO — Bot FSM State Diagram</text>
  <text x="550" y="60" text-anchor="middle" fill="#5a6a80" font-size="12">Finite State Machine with 6 States and 14 Transitions</text>

  <!-- ══════ STATE NODES ══════ -->

  <!-- WANDER (center top) -->
  <circle cx="550" cy="180" r="55" fill="none" stroke="#5aff8a" stroke-width="3" filter="url(#glow)"/>
  <text x="550" y="176" text-anchor="middle" fill="#5aff8a" font-size="16" font-weight="bold">WANDER</text>
  <text x="550" y="194" text-anchor="middle" fill="#5a6a80" font-size="10">(default/patrol)</text>

  <!-- Initial state arrow -->
  <line x1="550" y1="80" x2="550" y2="124" stroke="#00f0ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="565" y="100" fill="#00f0ff" font-size="10">start</text>

  <!-- HUNT (left middle) -->
  <circle cx="250" cy="370" r="55" fill="none" stroke="#ffa726" stroke-width="3" filter="url(#glow)"/>
  <text x="250" y="366" text-anchor="middle" fill="#ffa726" font-size="16" font-weight="bold">HUNT</text>
  <text x="250" y="384" text-anchor="middle" fill="#5a6a80" font-size="10">(chase prey)</text>

  <!-- FLEE (right middle) -->
  <circle cx="850" cy="370" r="55" fill="none" stroke="#ff5252" stroke-width="3" filter="url(#glow)"/>
  <text x="850" y="366" text-anchor="middle" fill="#ff5252" font-size="16" font-weight="bold">FLEE</text>
  <text x="850" y="384" text-anchor="middle" fill="#5a6a80" font-size="10">(escape threat)</text>

  <!-- AGGRESSIVE (center middle) -->
  <circle cx="550" cy="420" r="55" fill="none" stroke="#ff2d75" stroke-width="3" filter="url(#glow)"/>
  <text x="550" y="412" text-anchor="middle" fill="#ff2d75" font-size="14" font-weight="bold">AGGRESSIVE</text>
  <text x="550" y="432" text-anchor="middle" fill="#5a6a80" font-size="10">(attack player)</text>

  <!-- DEAD (left bottom) -->
  <circle cx="300" cy="620" r="50" fill="none" stroke="#555" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="300" y="616" text-anchor="middle" fill="#888" font-size="16" font-weight="bold">DEAD</text>
  <text x="300" y="634" text-anchor="middle" fill="#5a6a80" font-size="10">(respawn wait)</text>

  <!-- MERGE (right bottom) -->
  <circle cx="800" cy="600" r="50" fill="none" stroke="#7b2dff" stroke-width="3" filter="url(#glow)"/>
  <text x="800" y="596" text-anchor="middle" fill="#7b2dff" font-size="16" font-weight="bold">MERGE</text>
  <text x="800" y="614" text-anchor="middle" fill="#5a6a80" font-size="10">(regroup cells)</text>

  <!-- ══════ TRANSITIONS ══════ -->

  <!-- WANDER → HUNT (prey found within 400px) -->
  <path d="M 500 215 Q 370 270 280 320" fill="none" stroke="#ffa726" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="330" y="240" width="170" height="18" rx="3" fill="#0a0e17" stroke="#ffa726" stroke-width="0.5" opacity="0.9"/>
  <text x="415" y="253" text-anchor="middle" fill="#ffa726" font-size="10">prey within 400px</text>

  <!-- WANDER → FLEE (threat found within 300px) -->
  <path d="M 600 215 Q 730 270 820 320" fill="none" stroke="#ff5252" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="660" y="240" width="180" height="18" rx="3" fill="#0a0e17" stroke="#ff5252" stroke-width="0.5" opacity="0.9"/>
  <text x="750" y="253" text-anchor="middle" fill="#ff5252" font-size="10">threat within 300px</text>

  <!-- WANDER → AGGRESSIVE (player near + bot big + high aggr) -->
  <path d="M 540 235 Q 540 310 545 365" fill="none" stroke="#ff2d75" stroke-width="2" marker-end="url(#arrow-pink)"/>
  <rect x="440" y="298" width="200" height="18" rx="3" fill="#0a0e17" stroke="#ff2d75" stroke-width="0.5" opacity="0.9"/>
  <text x="540" y="311" text-anchor="middle" fill="#ff2d75" font-size="10">player near & bot > player×1.3</text>

  <!-- HUNT → WANDER (prey escapes >500px) -->
  <path d="M 280 318 Q 380 230 495 185" fill="none" stroke="#5aff8a" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>
  <rect x="320" y="210" width="160" height="18" rx="3" fill="#0a0e17" stroke="#5aff8a" stroke-width="0.5" opacity="0.9"/>
  <text x="400" y="223" text-anchor="middle" fill="#5aff8a" font-size="10">target dist > 500px</text>

  <!-- HUNT → FLEE (threat within 250px) -->
  <path d="M 305 370 Q 550 340 795 370" fill="none" stroke="#ff5252" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="490" y="335" width="175" height="18" rx="3" fill="#0a0e17" stroke="#ff5252" stroke-width="0.5" opacity="0.9"/>
  <text x="577" y="348" text-anchor="middle" fill="#ff5252" font-size="10">threat within 250px</text>

  <!-- HUNT → AGGRESSIVE (player near + bot bigger) -->
  <path d="M 300 390 Q 400 420 495 420" fill="none" stroke="#ff2d75" stroke-width="2" marker-end="url(#arrow-pink)"/>
  <rect x="320" y="415" width="175" height="18" rx="3" fill="#0a0e17" stroke="#ff2d75" stroke-width="0.5" opacity="0.9"/>
  <text x="408" y="428" text-anchor="middle" fill="#ff2d75" font-size="10">player near & bot > p×1.15</text>

  <!-- HUNT → MERGE (too many cells) -->
  <path d="M 270 425 Q 450 580 750 600" fill="none" stroke="#7b2dff" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="430" y="535" width="150" height="18" rx="3" fill="#0a0e17" stroke="#7b2dff" stroke-width="0.5" opacity="0.9"/>
  <text x="505" y="548" text-anchor="middle" fill="#7b2dff" font-size="10">cells.length > 3</text>

  <!-- AGGRESSIVE → FLEE (bigger threat) -->
  <path d="M 605 420 Q 720 400 795 385" fill="none" stroke="#ff5252" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="640" y="392" width="170" height="18" rx="3" fill="#0a0e17" stroke="#ff5252" stroke-width="0.5" opacity="0.9"/>
  <text x="725" y="405" text-anchor="middle" fill="#ff5252" font-size="10">threat > bot×1.5</text>

  <!-- AGGRESSIVE → WANDER (player escapes or bot shrinks) -->
  <path d="M 560 365 Q 575 280 555 235" fill="none" stroke="#5aff8a" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>
  <rect x="570" y="285" width="200" height="18" rx="3" fill="#0a0e17" stroke="#5aff8a" stroke-width="0.5" opacity="0.9"/>
  <text x="670" y="298" text-anchor="middle" fill="#5aff8a" font-size="10">player dist>600 | bot shrinks</text>

  <!-- FLEE → WANDER (no threats >400px) -->
  <path d="M 830 318 Q 730 230 605 185" fill="none" stroke="#5aff8a" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>
  <rect x="680" y="218" width="185" height="18" rx="3" fill="#0a0e17" stroke="#5aff8a" stroke-width="0.5" opacity="0.9"/>
  <text x="772" y="231" text-anchor="middle" fill="#5aff8a" font-size="10">no threats within 400px</text>

  <!-- FLEE → MERGE (multi-cell & safe) -->
  <path d="M 850 425 Q 840 510 810 550" fill="none" stroke="#7b2dff" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="835" y="478" width="175" height="18" rx="3" fill="#0a0e17" stroke="#7b2dff" stroke-width="0.5" opacity="0.9"/>
  <text x="923" y="491" text-anchor="middle" fill="#7b2dff" font-size="10">cells > 2 & no threats</text>

  <!-- MERGE → WANDER (done merging) -->
  <path d="M 770 555 Q 680 400 600 215" fill="none" stroke="#5aff8a" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>
  <rect x="670" y="450" width="150" height="18" rx="3" fill="#0a0e17" stroke="#5aff8a" stroke-width="0.5" opacity="0.9"/>
  <text x="745" y="463" text-anchor="middle" fill="#5aff8a" font-size="10">cells.length <= 1</text>

  <!-- ANY → DEAD (mass depleted) -->
  <path d="M 200 340 Q 180 500 280 575" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
  <rect x="110" y="475" width="150" height="18" rx="3" fill="#0a0e17" stroke="#888" stroke-width="0.5" opacity="0.9"/>
  <text x="185" y="488" text-anchor="middle" fill="#888" font-size="10">totalMass <= 0 (ANY)</text>

  <!-- DEAD → WANDER (respawn) -->
  <path d="M 310 570 Q 400 400 500 230" fill="none" stroke="#5aff8a" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>
  <rect x="330" y="440" width="180" height="18" rx="3" fill="#0a0e17" stroke="#5aff8a" stroke-width="0.5" opacity="0.9"/>
  <text x="420" y="453" text-anchor="middle" fill="#5aff8a" font-size="10">respawnTimer expires</text>

  <!-- ══════ LEGEND ══════ -->
  <rect x="30" y="680" width="1040" height="55" rx="5" fill="none" stroke="#5a6a80" stroke-width="1" opacity="0.5"/>
  <text x="50" y="700" fill="#5a6a80" font-size="11" font-weight="bold">LEGEND:</text>
  <circle cx="150" cy="696" r="8" fill="none" stroke="#5aff8a" stroke-width="2"/>
  <text x="165" y="700" fill="#5aff8a" font-size="10">WANDER</text>
  <circle cx="260" cy="696" r="8" fill="none" stroke="#ffa726" stroke-width="2"/>
  <text x="275" y="700" fill="#ffa726" font-size="10">HUNT</text>
  <circle cx="340" cy="696" r="8" fill="none" stroke="#ff5252" stroke-width="2"/>
  <text x="355" y="700" fill="#ff5252" font-size="10">FLEE</text>
  <circle cx="410" cy="696" r="8" fill="none" stroke="#ff2d75" stroke-width="2"/>
  <text x="425" y="700" fill="#ff2d75" font-size="10">AGGRESSIVE</text>
  <circle cx="540" cy="696" r="8" fill="none" stroke="#7b2dff" stroke-width="2"/>
  <text x="555" y="700" fill="#7b2dff" font-size="10">MERGE</text>
  <circle cx="620" cy="696" r="8" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="635" y="700" fill="#888" font-size="10">DEAD</text>

  <line x1="720" y1="696" x2="760" y2="696" stroke="#ffa726" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="770" y="700" fill="#5a6a80" font-size="10">Forward transition</text>
  <line x1="900" y1="696" x2="940" y2="696" stroke="#5aff8a" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="950" y="700" fill="#5a6a80" font-size="10">Return to WANDER</text>

  <text x="550" y="725" text-anchor="middle" fill="#5a6a80" font-size="10">Each bot has a unique aggressionLevel (0.3–1.0) that affects transition thresholds to AGGRESSIVE state</text>
</svg>
